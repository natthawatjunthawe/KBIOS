<!DOCTYPE html><html lang="th"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>KBIOS</title><script src="https://cdn.tailwindcss.com"></script><style>body{transition:background .3s;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:sans-serif}.no-scrollbar::-webkit-scrollbar{display:none}.no-scrollbar{-ms-overflow-style:none;scrollbar-width:none}</style></head><body><div class="w-full max-w-3xl px-4 flex flex-col items-center"><img id="logo" src="KBIOS.png" alt="KBIOS" class="h-20 sm:h-24 mb-8 object-contain"><div class="relative w-full max-w-2xl mb-8 z-50"><div class="flex items-center bg-white rounded-full shadow-md hover:shadow-lg focus-within:shadow-lg border border-gray-200 px-5 py-3 transition-shadow"><svg class="w-5 h-5 text-gray-400 mr-3 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg><input type="text" id="search" class="w-full outline-none text-lg text-gray-700 bg-transparent" placeholder="พิมพ์เพื่อเลือกคำแนะนำ..." autocomplete="off"></div><ul id="suggestions" class="absolute w-full bg-white border border-gray-100 rounded-2xl shadow-xl mt-2 overflow-hidden hidden max-h-60 overflow-y-auto"></ul></div><div class="w-full max-w-3xl mt-4"><h3 id="trend-title" class="text-sm text-gray-600 mb-3 font-semibold px-2 hidden">ข่าวสาร & สิ่งที่น่าสนใจ</h3><div id="trending" class="flex overflow-x-auto space-x-4 no-scrollbar pb-4 snap-x"></div></div></div><script>let searchData=[];const logoEl=document.getElementById("logo"),searchEl=document.getElementById("search"),suggEl=document.getElementById("suggestions"),trendEl=document.getElementById("trending"),trendTitle=document.getElementById("trend-title");fetch("data.json").then(e=>e.json()).then(e=>{document.body.style.background=e.config.background,logoEl.src=e.config.logo,searchData=e.searchData,e.trending.length&&(trendTitle.classList.remove("hidden"),e.trending.forEach(e=>{trendEl.innerHTML+=`<a href="${e.url}" class="snap-start shrink-0 w-56 sm:w-64 bg-white rounded-2xl shadow hover:shadow-lg border border-gray-100 overflow-hidden block transition-shadow"><img src="${e.image}" class="w-full h-32 object-cover"><div class="p-3"><p class="text-sm font-medium text-gray-800 line-clamp-2">${e.title}</p></div></a>`}))}).catch(e=>console.error("Error!"));searchEl.addEventListener("keydown",e=>{"Enter"===e.key&&e.preventDefault()});searchEl.addEventListener("input",e=>{let t=e.target.value.toLowerCase();if(suggEl.innerHTML="",!t)return void suggEl.classList.add("hidden");let n=searchData.filter(e=>e.keyword.toLowerCase().includes(t));n.length?(n.forEach(e=>{let t=document.createElement("li");t.className="px-5 py-3 hover:bg-gray-100 cursor-pointer text-gray-700 flex items-center gap-3 transition-colors",t.innerHTML=`<svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>${e.keyword}`,t.onclick=()=>window.location.href=e.url,suggEl.appendChild(t)}),suggEl.classList.remove("hidden")):suggEl.classList.add("hidden")}),document.addEventListener("click",e=>{!searchEl.contains(e.target)&&!suggEl.contains(e.target)&&suggEl.classList.add("hidden")});</script></body></html>
