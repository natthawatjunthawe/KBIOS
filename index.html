<!DOCTYPE html><html lang="th"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>KBIOS</title><script src="https://cdn.tailwindcss.com"></script><style>body{transition:background .3s;min-height:100vh;display:flex;flex-direction:column;align-items:center;font-family:sans-serif;margin:0;padding-top:60px;overflow-x:hidden}.no-scrollbar::-webkit-scrollbar{display:none}.no-scrollbar{-ms-overflow-style:none;scrollbar-width:none}@keyframes f{0%,100%{transform:translateY(0) scale(1.15);filter:drop-shadow(0 15px 15px rgba(0,0,0,.4))}50%{transform:translateY(-20px) scale(1.25);filter:drop-shadow(0 25px 25px rgba(0,0,0,.7))}}#logo{animation:f 4s ease-in-out infinite;margin-top:2rem}#tb{position:fixed;top:0;left:0;width:100%;height:60px;z-index:999;background:#000;overflow:hidden}#ti{width:100%;height:100%;object-fit:cover;opacity:.8;transition:opacity 1s}</style></head><body><div id="tb"><img id="ti" src="https://picsum.photos/1200/100?random=1" alt="banner"></div><div class="w-full max-w-3xl px-4 flex flex-col items-center mt-10"><img id="logo" src="KBIOS.png" alt="KBIOS" class="h-32 sm:h-40 mb-12 object-contain"><div class="relative w-full max-w-2xl mb-8 z-50"><div class="flex items-center bg-white/90 backdrop-blur rounded-full shadow-[0_0_20px_rgba(0,0,0,.1)] hover:shadow-[0_0_30px_rgba(0,0,0,.2)] focus-within:shadow-[0_0_40px_rgba(0,0,0,.3)] focus-within:scale-105 border border-gray-200 px-5 py-4 transition-all duration-300"><svg class="w-6 h-6 text-gray-500 mr-3 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg><input type="text" id="s" class="w-full outline-none text-xl text-gray-800 bg-transparent font-medium" placeholder="พิมพ์เพื่อค้นหา..." autocomplete="off"></div><ul id="sg" class="absolute w-full bg-white/95 backdrop-blur border border-gray-100 rounded-2xl shadow-2xl mt-4 hidden max-h-80 overflow-y-auto z-50"></ul></div><div class="w-full max-w-3xl mt-2 flex flex-col items-center"><h3 id="tt" class="text-lg text-gray-700 mb-4 font-bold px-2 hidden tracking-wide">ข่าวสาร & สิ่งที่น่าสนใจ</h3><div id="tr" class="flex flex-col w-full max-w-xl space-y-4 pb-10"></div></div></div><script>let d=[];const l=document.getElementById("logo"),s=document.getElementById("s"),u=document.getElementById("sg"),t=document.getElementById("tr"),tt=document.getElementById("tt"),ti=document.getElementById("ti");setInterval(()=>{ti.style.opacity=0;setTimeout(()=>{ti.src=`https://picsum.photos/1200/100?random=${Math.random()}`;ti.style.opacity=.8},1e3)},5e3);fetch("data.json").then(r=>r.json()).then(r=>{document.body.style.background=r.config.background;l.src=r.config.logo;d=r.searchData;if(r.trending.length){tt.classList.remove("hidden");r.trending.forEach(x=>{t.innerHTML+=`<a href="${x.url}" class="w-full bg-white/90 backdrop-blur rounded-2xl shadow-lg hover:shadow-2xl border border-gray-100 overflow-hidden flex items-center transition-all duration-300 hover:scale-[1.03]"><img src="${x.image}" class="w-1/3 h-28 object-cover"><div class="p-4 w-2/3"><p class="text-base font-bold text-gray-800 line-clamp-2">${x.title}</p></div></a>`})}}).catch(()=>0);s.addEventListener("keydown",e=>{"Enter"===e.key&&e.preventDefault()});s.addEventListener("input",e=>{let v=e.target.value.toLowerCase();u.innerHTML="";if(!v)return u.classList.add("hidden");let f=d.filter(x=>x.keyword.toLowerCase().includes(v));if(f.length){f.forEach(x=>{let i=document.createElement("li");i.className="px-6 py-4 hover:bg-gray-100 cursor-pointer text-gray-800 font-medium flex items-center gap-4 transition-colors border-b border-gray-50 last:border-0";i.innerHTML=`<svg class="w-5 h-5 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>${x.keyword}`;i.onclick=()=>window.location.href=x.url;u.appendChild(i)});u.classList.remove("hidden")}else u.classList.add("hidden")});document.addEventListener("click",e=>{!s.contains(e.target)&&!u.contains(e.target)&&u.classList.add("hidden")});let fs=0;window.addEventListener("touchstart",()=>{if(!fs&&window.scrollY>10){try{document.documentElement.requestFullscreen()}catch(e){}fs=1}},{passive:!0});</script></body></html>
