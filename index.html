<!DOCTYPE html><html lang="th"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>KBIOS</title><script src="https://cdn.tailwindcss.com"></script><style>body{transition:background .3s;min-height:100vh;display:flex;flex-direction:column;align-items:center;font-family:sans-serif;margin:0;overflow-x:hidden}.no-scrollbar::-webkit-scrollbar{display:none}.no-scrollbar{-ms-overflow-style:none;scrollbar-width:none}#logo{filter:drop-shadow(0 20px 35px rgba(0,0,0,0.2));margin-top:4rem}</style></head><body><div id="ld" class="fixed inset-0 bg-white/95 backdrop-blur-md flex flex-col items-center justify-center z-[9999] hidden"><div class="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mb-4"></div><p class="text-xl font-bold text-gray-800 tracking-wide">Redirecting...</p></div><div class="w-full max-w-3xl px-4 flex flex-col items-center mt-2"><img id="logo" src="KBIOS.png" alt="KBIOS" class="w-full max-w-3xl h-[42vh] min-h-[320px] mb-8 object-contain"><div class="relative w-full max-w-2xl mb-12 z-50"><div class="flex items-center bg-white/90 backdrop-blur rounded-full shadow-[0_0_25px_rgba(0,0,0,0.08)] hover:shadow-[0_0_35px_rgba(0,0,0,0.15)] focus-within:shadow-[0_0_45px_rgba(0,0,0,0.22)] focus-within:scale-105 border border-gray-200 px-5 py-4 transition-all duration-300"><svg class="w-6 h-6 text-gray-500 mr-3 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg><input type="text" id="s" class="w-full outline-none text-xl text-gray-800 bg-transparent font-medium" placeholder="Search..." autocomplete="off"></div><ul id="sg" class="absolute w-full bg-white/95 backdrop-blur border border-gray-100 rounded-2xl shadow-2xl mt-4 hidden max-h-80 overflow-y-auto z-50"></ul></div><div class="w-full max-w-3xl mt-2 flex flex-col items-center"><h3 id="tt" class="text-xl text-gray-800 mb-6 font-bold px-2 hidden tracking-wide">Info</h3><div id="tr" class="flex flex-col w-full max-w-2xl space-y-5 pb-12"></div></div></div><script>let d=[];const l=document.getElementById("logo"),s=document.getElementById("s"),u=document.getElementById("sg"),t=document.getElementById("tr"),tt=document.getElementById("tt"),ld=document.getElementById("ld"),go=url=>{ld.classList.remove("hidden");setTimeout(()=>window.location.href=url,400)};fetch("data.json").then(r=>r.json()).then(r=>{document.body.style.background=r.config.background;l.src=r.config.logo;d=r.searchData;if(r.trending.length){tt.classList.remove("hidden");r.trending.forEach(x=>{t.innerHTML+=`<div onclick="go('${x.url}')" class="w-full bg-white rounded-[28px] border border-gray-100 shadow-[0_4px_24px_rgba(0,0,0,0.04)] hover:shadow-[0_8px_32px_rgba(0,0,0,0.08)] p-5 flex justify-between items-center gap-5 cursor-pointer transition-all duration-300 hover:scale-[1.01] active:scale-[0.99]"><div class="flex-1"><h4 class="text-[17px] sm:text-[19px] font-semibold text-gray-900 leading-snug line-clamp-3">${x.title}</h4></div><img src="${x.image}" class="w-[96px] h-[96px] sm:w-[115px] sm:h-[115px] rounded-2xl object-cover shrink-0 shadow-sm border border-gray-50"></div>`})}}).catch(()=>0);s.addEventListener("keydown",e=>{"Enter"===e.key&&e.preventDefault()});s.addEventListener("input",e=>{let v=e.target.value.toLowerCase();u.innerHTML="";if(!v)return u.classList.add("hidden");let f=d.filter(x=>x.keyword.toLowerCase().includes(v));if(f.length){f.forEach(x=>{let i=document.createElement("li");i.className="px-6 py-4 hover:bg-gray-100 cursor-pointer text-gray-800 font-medium flex items-center gap-4 transition-colors border-b border-gray-50 last:border-0";i.innerHTML=`<svg class="w-5 h-5 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>${x.keyword}`;i.onclick=()=>go(x.url);u.appendChild(i)});u.classList.remove("hidden")}else u.classList.add("hidden")});document.addEventListener("click",e=>{!s.contains(e.target)&&!u.contains(e.target)&&u.classList.add("hidden")});let fs=0;window.addEventListener("touchstart",()=>{if(!fs&&window.scrollY>10){try{document.documentElement.requestFullscreen()}catch(e){}fs=1}},{passive:!0});</script></body></html>
